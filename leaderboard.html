<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCxKk67W6ue5RgSVJ0elM664kI2GyNQrj8",
  authDomain: "rahmaniyya-madrasa.firebaseapp.com",
  databaseURL: "https://rahmaniyya-madrasa-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rahmaniyya-madrasa",
  storageBucket: "rahmaniyya-madrasa.firebasestorage.app",
  messagingSenderId: "591596525388",
  appId: "1:591596525388:web:4afa93412b4a452277e1e9"
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ADD TEST DATA
function addTestData() {
  db.ref("leaderboard").push({ name: "Hafna", score: 50 });
  db.ref("leaderboard").push({ name: "Zahra", score: 48 });
  db.ref("leaderboard").push({ name: "Nia", score: 49 });

  alert("Data added!");
}

// LOAD DATA
db.ref("leaderboard").on("value", (snapshot) => {
  const data = snapshot.val();

  const table = document.querySelector("#leaderboardTable tbody");
  table.innerHTML = "";

  if (!data) return;

  const list = Object.values(data).sort((a,b)=>b.score-a.score);

  list.forEach((student, index) => {
    let row = table.insertRow();
    row.innerHTML = `
      <td>${index + 1}</td>
      <td>${student.name}</td>
      <td>${student.score}</td>
    `;
  });
});
</script>
